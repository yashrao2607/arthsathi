# =============================================================================
# ArthSathi (अर्थसाथी) Fine-Tuning Pipeline Configuration
# =============================================================================
model:
  name: "Qwen/Qwen3-4B"
  trust_remote_code: true
  use_flash_attention: false
  max_seq_length: 2048
  dtype: "float16"

dataset:
  sources:
    - name: "bharatgenai/FinanceParam"
      split: "train"
      format: "financeparam"
    - name: "gbharti/finance-alpaca"
      split: "train"
      format: "alpaca"
  output_dir: "./data"
  train_file: "train.jsonl"
  val_file: "val.jsonl"
  test_file: "test.jsonl"
  train_ratio: 0.90
  val_ratio: 0.05
  test_ratio: 0.05
  min_instruction_length: 10
  min_output_length: 20
  max_instruction_length: 1024
  max_output_length: 2048
  deduplication_threshold: 0.85
  system_prompt: |
    You are ArthSathi (अर्थसाथी), an expert Indian financial advisor AI. You provide accurate,
    helpful, and regulation-compliant financial guidance for Indian users.

lora:
  rank: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_use_double_quant: true

training:
  output_dir: "./output"
  checkpoint_dir: "./checkpoints"
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01
  num_train_epochs: 3
  max_steps: -1
  fp16: true
  bf16: false
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  logging_steps: 25
  logging_dir: "./logs"
  report_to: "tensorboard"
  eval_strategy: "steps"
  eval_steps: 250
  eval_accumulation_steps: 4
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  seed: 42
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  remove_unused_columns: false
  neftune_noise_alpha: 5
